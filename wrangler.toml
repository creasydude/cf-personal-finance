name = "personal-finance"
compatibility_date = "2024-08-01"

[[d1_databases]]
binding = "DB"
database_name = "personal-finance-db"
database_id = "YOUR_D1_DATABASE_ID" # Replace after: wrangler d1 create personal-finance-db

[[kv_namespaces]]
binding = "RATE_CACHE"
id = "YOUR_KV_NAMESPACE_ID" # Replace after: wrangler kv:namespace create RATE_CACHE
